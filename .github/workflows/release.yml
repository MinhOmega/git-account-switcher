name: Build & Release (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build --config vite.config.ts

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          # Uncomment and set these secrets to enable code signing & notarization:
          # ELECTROBUN_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          # ELECTROBUN_APPLEID: ${{ secrets.APPLE_ID }}
          # ELECTROBUN_APPLEIDPASS: ${{ secrets.APPLE_ID_PASSWORD }}
          # ELECTROBUN_TEAMID: ${{ secrets.APPLE_TEAM_ID }}
          CI: true

      - name: List build artifacts
        run: |
          echo "=== Build directory ==="
          ls -laR build/ || true
          echo "=== Artifacts directory ==="
          ls -laR artifacts/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*.dmg
            artifacts/*.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
