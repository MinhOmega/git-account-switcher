name: Build & Release (Manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v1.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: macos-arm64
          - runner: macos-13
            platform: macos-x64
          - runner: ubuntu-latest
            platform: linux-x64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build --config vite.config.ts

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          CI: true

      - name: List build artifacts
        run: |
          echo "=== Build directory ==="
          ls -laR build/ || true
          echo "=== Artifacts directory ==="
          ls -laR artifacts/ || true
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List all artifacts
        run: |
          echo "=== All downloaded artifacts ==="
          find all-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            all-artifacts/*.dmg
            all-artifacts/*.tar.zst
            all-artifacts/*.tar.gz
            all-artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
