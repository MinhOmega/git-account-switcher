name: Version Bump & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip if commit message contains [skip ci] (prevents infinite loops)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Determine bump type from commit message
        id: bump-type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if echo "$COMMIT_MSG" | grep -qi "BREAKING CHANGE" || echo "$COMMIT_MSG" | grep -q "^major:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qE "^feat[:(]" || echo "$COMMIT_MSG" | grep -q "minor:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

          echo "Detected bump type: $(cat $GITHUB_OUTPUT | grep type | cut -d= -f2)"

      - name: Bump version
        id: version
        run: |
          bun scripts/bump-version.ts ${{ steps.bump-type.outputs.type }}
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json electrobun.config.ts src/shared/constants.ts
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new_version }}"

  release:
    needs: bump
    runs-on: macos-latest

    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build --config vite.config.ts

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          # Uncomment and set these secrets to enable code signing & notarization:
          # ELECTROBUN_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          # ELECTROBUN_APPLEID: ${{ secrets.APPLE_ID }}
          # ELECTROBUN_APPLEIDPASS: ${{ secrets.APPLE_ID_PASSWORD }}
          # ELECTROBUN_TEAMID: ${{ secrets.APPLE_TEAM_ID }}
          CI: true

      - name: List build artifacts
        run: |
          echo "=== Build directory ==="
          ls -laR build/ || true
          echo "=== Artifacts directory ==="
          ls -laR artifacts/ || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag_name }}
          name: "v${{ needs.bump.outputs.new_version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*.dmg
            artifacts/*.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
