name: Version Bump & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip if commit message contains [skip ci] (prevents infinite loops)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Determine bump type from commit message
        id: bump-type
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          if echo "$COMMIT_MSG" | grep -qi "BREAKING CHANGE" || echo "$COMMIT_MSG" | grep -q "^major:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -qE "^feat[:(]" || echo "$COMMIT_MSG" | grep -q "minor:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

          echo "Detected bump type: $(cat $GITHUB_OUTPUT | grep type | cut -d= -f2)"

      - name: Bump version
        id: version
        run: |
          bun scripts/bump-version.ts ${{ steps.bump-type.outputs.type }}
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json electrobun.config.ts src/shared/constants.ts
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag -a "v${{ steps.version.outputs.new_version }}" -m "Release v${{ steps.version.outputs.new_version }}"
          git push origin main
          git push origin "v${{ steps.version.outputs.new_version }}"

  build:
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: macos-arm64
          - runner: macos-15-intel
            platform: macos-x64
          - runner: ubuntu-latest
            platform: linux-x64
          - runner: ubuntu-24.04-arm
            platform: linux-arm64
          - runner: windows-latest
            platform: win-x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag_name }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bunx vite build --config vite.config.ts

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          CI: true

      - name: List build artifacts
        run: |
          echo "=== Build directory ==="
          ls -laR build/ || true
          echo "=== Artifacts directory ==="
          ls -laR artifacts/ || true
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: artifacts/*
          if-no-files-found: warn

  release:
    needs: [bump, build]
    if: always() && needs.bump.result == 'success' && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List all artifacts
        run: |
          echo "=== All downloaded artifacts ==="
          find all-artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag_name }}
          name: "v${{ needs.bump.outputs.new_version }}"
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            all-artifacts/*.dmg
            all-artifacts/*.tar.zst
            all-artifacts/*.tar.gz
            all-artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
